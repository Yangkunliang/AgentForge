name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: agentforge_test
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run linter
        run: |
          ruff check src/

      - name: Run type checker
        run: |
          mypy src/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://agent:agent@localhost:5432/agentforge_test
        run: |
          pytest tests/ -v --cov=src/ --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Ruff check
        run: |
          ruff check src/

      - name: Ruff format check
        run: |
          ruff format --check src/

      - name: MyPy
        run: |
          mypy src/
