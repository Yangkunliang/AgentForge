repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [types-redis, types-python-jose]
        args: [--config-file=pyproject.toml]
        exclude: ^migrations/

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest
        entry: bash -c 'pytest tests/ -x --tb=short -q'
        language: python
        pass_filenames: false
        always_run: false
        stages: [commit]
